<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKY ACE</title>
    <style>
        :root {
            --accent: #00ff88;
            --accent2: #ffaa00;
            --danger: #ff3366;
            --cyan: #00ddff;
            --bg: #06060c;
        }
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; -webkit-tap-highlight-color:transparent; }
        body { background:var(--bg); overflow:hidden; font-family:'Courier New',monospace; touch-action:none; position:fixed; inset:0; }
        canvas { display:block; width:100%; height:100%; }

        /* === HUD === */
        #hud { position:fixed; top:0; left:0; right:0; padding:12px 16px; display:flex; justify-content:space-between; align-items:flex-start; pointer-events:none; z-index:10; }
        #hud-left, #hud-right { display:flex; flex-direction:column; gap:4px; }
        #hud-left { align-items:flex-start; }
        #hud-right { align-items:flex-end; }
        #lives { display:flex; gap:6px; }
        .life { width:22px; height:22px; background:var(--danger); clip-path:polygon(50% 0%,100% 35%,80% 100%,50% 75%,20% 100%,0% 35%); filter:drop-shadow(0 0 6px var(--danger)); transition:opacity .3s; }
        .life.lost { opacity:.2; filter:none; }
        #shield-indicator { font-size:10px; color:var(--cyan); letter-spacing:2px; opacity:0; transition:opacity .3s; text-shadow:0 0 8px var(--cyan); }
        #shield-indicator.show { opacity:1; }
        #score-display { font-size:28px; font-weight:bold; color:#fff; text-shadow:0 0 12px var(--accent); letter-spacing:2px; line-height:1; }
        #highscore-display { font-size:11px; color:var(--accent2); letter-spacing:1px; }
        #level-display { font-size:10px; color:#888; letter-spacing:2px; margin-top:2px; }
        #new-record-flash { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); font-size:36px; font-weight:bold; color:var(--accent2); text-shadow:0 0 30px var(--accent2),0 0 60px var(--accent2); pointer-events:none; z-index:15; opacity:0; transition:opacity .2s; letter-spacing:4px; }

        /* === COMBO === */
        #combo-display { position:fixed; top:60px; left:50%; transform:translateX(-50%); text-align:center; pointer-events:none; z-index:10; opacity:0; transition:opacity .2s; }
        #combo-display.show { opacity:1; }
        #combo-text { font-size:22px; font-weight:bold; color:var(--accent2); text-shadow:0 0 12px var(--accent2); }
        #combo-bar-bg { width:140px; height:3px; background:rgba(255,255,255,.15); border-radius:2px; margin:4px auto 0; overflow:hidden; }
        #combo-bar-fill { height:100%; width:0%; background:linear-gradient(90deg,var(--accent2),var(--danger)); border-radius:2px; transition:width .05s linear; }
        #fever-text { font-size:14px; color:var(--danger); letter-spacing:4px; margin-top:2px; opacity:0; text-shadow:0 0 10px var(--danger); }
        #fever-text.show { opacity:1; animation:feverPulse .3s infinite alternate; }
        @keyframes feverPulse { to { transform:scale(1.15); } }

        /* === BOTONES MÓVILES === */
        #mobile-buttons { position:fixed; bottom:24px; right:16px; display:flex; gap:14px; z-index:20; pointer-events:auto; }
        .mob-btn { width:72px; height:72px; border-radius:50%; border:3px solid; display:flex; align-items:center; justify-content:center; flex-direction:column; font-size:28px; backdrop-filter:blur(4px); transition:transform .08s, background .08s; touch-action:none; }
        .mob-btn:active, .mob-btn.pressed { transform:scale(.88); }
        .mob-btn .label { font-size:8px; letter-spacing:1px; margin-top:2px; font-weight:bold; }
        #btn-dash { border-color:rgba(0,221,255,.5); background:rgba(0,221,255,.12); color:var(--cyan); }
        #btn-dash:active, #btn-dash.pressed { background:rgba(0,221,255,.35); }
        #btn-bomb { border-color:rgba(255,170,0,.5); background:rgba(255,170,0,.12); color:var(--accent2); }
        #btn-bomb:active, #btn-bomb.pressed { background:rgba(255,170,0,.35); }
        #bomb-count-badge { position:absolute; top:-4px; right:-4px; background:var(--danger); color:#fff; font-size:10px; font-weight:bold; width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; }

        /* === DASH CD === */
        #dash-cd-bar { position:fixed; bottom:100px; right:26px; width:48px; height:3px; background:rgba(255,255,255,.1); border-radius:2px; overflow:hidden; pointer-events:none; z-index:20; }
        #dash-cd-fill { height:100%; width:100%; background:var(--cyan); border-radius:2px; transition:width .05s linear; }

        /* === BOSS BAR === */
        #boss-bar-container { position:fixed; top:55px; left:50%; transform:translateX(-50%); width:min(300px,80vw); background:rgba(0,0,0,.7); backdrop-filter:blur(6px); padding:8px 14px; border-radius:10px; border:1px solid rgba(255,51,102,.3); pointer-events:none; z-index:10; opacity:0; transition:opacity .3s; }
        #boss-bar-container.show { opacity:1; }
        #boss-label { font-size:11px; color:var(--danger); text-align:center; letter-spacing:3px; margin-bottom:4px; }
        #boss-bar-bg { height:8px; background:#220011; border-radius:4px; overflow:hidden; }
        #boss-bar-fill { height:100%; width:100%; background:linear-gradient(90deg,var(--danger),var(--accent2)); border-radius:4px; transition:width .15s; }

        /* === OVERLAY MENÚ === */
        #overlay { position:fixed; inset:0; background:rgba(6,6,12,.96); backdrop-filter:blur(12px); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; padding:20px; }
        #overlay.hidden { display:none; }
        #game-title { font-size:clamp(42px,12vw,72px); color:var(--accent); text-shadow:0 0 40px var(--accent),0 0 80px rgba(0,255,136,.4); letter-spacing:6px; line-height:1; }
        #game-subtitle { font-size:clamp(11px,3vw,14px); color:var(--accent2); letter-spacing:4px; margin-top:8px; }
        .menu-input { width:240px; max-width:80vw; padding:10px 14px; border:2px solid rgba(0,255,136,.3); border-radius:12px; background:rgba(0,255,136,.06); color:#fff; font-size:16px; text-align:center; outline:none; margin-top:24px; font-family:inherit; }
        .menu-input::placeholder { color:#444; }
        .menu-input:focus { border-color:var(--accent); box-shadow:0 0 20px rgba(0,255,136,.15); }
        .records-box { width:240px; max-width:80vw; margin-top:16px; padding:10px 14px; background:rgba(255,255,255,.03); border:1px solid rgba(0,255,136,.15); border-radius:10px; }
        .records-title { font-size:10px; color:var(--accent); letter-spacing:2px; text-align:center; margin-bottom:6px; }
        .record-row { display:flex; justify-content:space-between; font-size:12px; color:#999; padding:2px 0; }
        .record-row span:first-child { color:#ddd; }
        .menu-features { margin-top:20px; display:flex; gap:16px; flex-wrap:wrap; justify-content:center; }
        .feat { font-size:11px; color:#666; letter-spacing:1px; }
        .feat b { color:var(--accent2); }
        .play-btn { margin-top:28px; background:transparent; border:2px solid var(--accent); color:var(--accent); font-family:inherit; font-size:clamp(16px,4vw,20px); padding:14px 48px; letter-spacing:4px; cursor:pointer; border-radius:8px; transition:all .2s; }
        .play-btn:active { background:var(--accent); color:#000; transform:scale(.96); box-shadow:0 0 30px var(--accent); }
        .desktop-hint { position:absolute; bottom:16px; font-size:10px; color:#444; letter-spacing:1px; }

        /* === GAME OVER === */
        #gameover { position:fixed; inset:0; background:rgba(6,6,12,.92); backdrop-filter:blur(8px); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; padding:20px; }
        #gameover.hidden { display:none; }
        #go-title { font-size:clamp(32px,10vw,52px); color:var(--danger); text-shadow:0 0 30px var(--danger); letter-spacing:4px; }
        #go-stats { margin-top:20px; text-align:center; }
        #go-stats p { color:#ccc; font-size:14px; margin:8px 0; }
        #go-stats .big { font-size:clamp(28px,8vw,40px); font-weight:bold; color:#fff; text-shadow:0 0 15px var(--accent); }
        #go-stats .record { color:var(--accent2); font-size:13px; letter-spacing:2px; }
        .go-btn { margin-top:24px; background:transparent; border:2px solid var(--accent); color:var(--accent); font-family:inherit; font-size:clamp(18px,5vw,24px); padding:16px 56px; letter-spacing:3px; cursor:pointer; border-radius:8px; transition:all .15s; }
        .go-btn:active { background:var(--accent); color:#000; transform:scale(.95); box-shadow:0 0 30px var(--accent); }
        .go-btn.secondary { border-color:#555; color:#777; font-size:13px; padding:10px 30px; margin-top:12px; }
        .go-btn.secondary:active { background:#555; color:#fff; }

        /* === TOUCH JOYSTICK VISUAL === */
        #joystick-visual { position:fixed; pointer-events:none; z-index:5; opacity:0; transition:opacity .1s; }
        #joystick-visual.show { opacity:1; }
        #joystick-base { width:60px; height:60px; border:2px solid rgba(0,221,255,.25); border-radius:50%; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); }
        #joystick-thumb { width:24px; height:24px; background:rgba(0,221,255,.4); border-radius:50%; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); transition:none; }

        /* Escritorio: ocultar botones */
        @media (hover:hover) and (pointer:fine) {
            #mobile-buttons, #dash-cd-bar, #joystick-visual { display:none !important; }
            .desktop-hint { display:block; }
        }
        @media (hover:none), (pointer:coarse) {
            .desktop-hint { display:none; }
        }
    </style>
</head>
<body>
<canvas id="c"></canvas>

<!-- HUD -->
<div id="hud">
    <div id="hud-left">
        <div id="lives"></div>
        <div id="shield-indicator">ESCUDO ON</div>
    </div>
    <div id="hud-right">
        <div id="score-display">0</div>
        <div id="highscore-display"></div>
        <div id="level-display">NIVEL 1</div>
    </div>
</div>

<div id="combo-display">
    <div id="combo-text">x2</div>
    <div id="combo-bar-bg"><div id="combo-bar-fill"></div></div>
    <div id="fever-text">FEVER</div>
</div>

<div id="new-record-flash">NUEVO RECORD</div>

<div id="boss-bar-container">
    <div id="boss-label">JEFE ENEMIGO</div>
    <div id="boss-bar-bg"><div id="boss-bar-fill"></div></div>
</div>

<div id="dash-cd-bar"><div id="dash-cd-fill"></div></div>

<!-- Botones táctiles -->
<div id="mobile-buttons">
    <div class="mob-btn" id="btn-dash" style="position:relative">⚡<span class="label">DASH</span></div>
    <div class="mob-btn" id="btn-bomb" style="position:relative">💣<span class="label">BOMBA</span><span id="bomb-count-badge">2</span></div>
</div>

<!-- Joystick visual -->
<div id="joystick-visual"><div id="joystick-base"></div><div id="joystick-thumb"></div></div>

<!-- Menú principal -->
<div id="overlay">
    <div id="game-title">SKY ACE</div>
    <div id="game-subtitle">EDICION LEGENDARIA</div>
    <input class="menu-input" id="name-input" placeholder="TU NOMBRE" maxlength="12" />
    <div class="records-box"><div class="records-title">TOP RECORDS</div><div id="records-list"></div></div>
    <div class="menu-features">
        <div class="feat"><b>AUTO-DISPARO</b></div>
        <div class="feat"><b>COMBO x12</b></div>
        <div class="feat"><b>NEAR MISS</b></div>
        <div class="feat"><b>FEVER MODE</b></div>
    </div>
    <button class="play-btn" id="btn-play">JUGAR</button>
    <div class="desktop-hint">FLECHAS MOVER &middot; SHIFT DASH &middot; X BOMBA</div>
</div>

<!-- Game Over -->
<div id="gameover" class="hidden">
    <div id="go-title">GAME OVER</div>
    <div id="go-stats"></div>
    <button class="go-btn" id="btn-retry">REINTENTAR</button>
    <button class="go-btn secondary" id="btn-menu">MENÚ</button>
</div>

<script>
/* ========================================
   SKY ACE - Versión Móvil Adictiva
   ======================================== */

// --- CANVAS ---
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
    W = canvas.width = window.innerWidth * devicePixelRatio;
    H = canvas.height = window.innerHeight * devicePixelRatio;
    ctx.scale(1, 1);
}
resize();
window.addEventListener('resize', resize);

// Escala para coords lógicas (match CSS pixels)
function sx() { return window.innerWidth / W; }
function sy() { return window.innerHeight / H; }

// --- ELEMENTOS UI ---
const $id = id => document.getElementById(id);
const livesEl = $id('lives');
const scoreEl = $id('score-display');
const hsEl = $id('highscore-display');
const levelEl = $id('level-display');
const shieldEl = $id('shield-indicator');
const comboDisp = $id('combo-display');
const comboText = $id('combo-text');
const comboFill = $id('combo-bar-fill');
const feverText = $id('fever-text');
const recordFlash = $id('new-record-flash');
const bossContainer = $id('boss-bar-container');
const bossFill = $id('boss-bar-fill');
const dashCdFill = $id('dash-cd-fill');
const bombBadge = $id('bomb-count-badge');
const overlayEl = $id('overlay');
const goEl = $id('gameover');
const goStats = $id('go-stats');
const nameInput = $id('name-input');
const recordsList = $id('records-list');
const joystickVis = $id('joystick-visual');
const joystickThumb = $id('joystick-thumb');

// --- SONIDO / VIBRACIÓN ---
function vibrate(ms) { try { navigator.vibrate && navigator.vibrate(ms); } catch(e){} }
function vibratePattern() { try { navigator.vibrate && navigator.vibrate([30, 20, 50]); } catch(e){} }

// --- PERSISTENCIA ---
function getRecords() { try { return JSON.parse(localStorage.getItem('sa_records') || '{}'); } catch(e) { return {}; } }
function saveRecords(r) { localStorage.setItem('sa_records', JSON.stringify(r)); }
function getUserName() { return (nameInput.value.trim() || 'PILOTO'); }
function getHS(name) { return parseInt(getRecords()[name || getUserName()] || '0'); }
function setHS(score, name) {
    name = name || getUserName();
    const r = getRecords();
    const prev = parseInt(r[name] || '0');
    if (score > prev) { r[name] = score; saveRecords(r); }
    return score > prev;
}
function showRecords() {
    const r = getRecords();
    const entries = Object.entries(r).sort((a,b) => b[1]-a[1]).slice(0,5);
    recordsList.innerHTML = entries.length ? entries.map(([n,s]) => `<div class="record-row"><span>${n}</span><span>${s.toLocaleString()}</span></div>`).join('') : '<div class="record-row" style="color:#555;justify-content:center">Sin records</div>';
}
function showHSDisplay(name) {
    name = name || getUserName();
    hsEl.textContent = `RECORD: ${getHS(name).toLocaleString()}`;
}
nameInput.value = localStorage.getItem('sa_name') || '';
nameInput.addEventListener('input', () => showHSDisplay());
showRecords();
showHSDisplay();

// --- CONFIGURACIÓN ---
const LEVELS = [
    { name:'CIELOS DE AMANECER', killsNeeded:14, bossHP:90, maxE:5, spawnDelay:65, bg:['#0f0818','#1a0e28','#2a1530','#4a2520'] },
    { name:'TEMPESTA ELECTRICA', killsNeeded:18, bossHP:140, maxE:9, spawnDelay:48, bg:['#080812','#101020','#181830','#252540'] },
    { name:'ABISMO COSMICO', killsNeeded:22, bossHP:200, maxE:12, spawnDelay:40, bg:['#020208','#050510','#0a0a1a','#0f0f28'] },
    { name:'INFIERNO FINAL', killsNeeded:28, bossHP:280, maxE:14, spawnDelay:34, bg:['#120000','#1a0000','#220000','#2a0808'] }
];

const CFG = {
    playerSpeed: 7.5,
    fireRate: 6,
    bulletSpeed: 14,
    comboTimeout: 80,
    nearMissDist: 28,
    nearMissBonus: 50,
    dashFrames: 7,
    dashCooldown: 80,
    dashSpeed: 20,
    feverThreshold: 8,
    touchOffset: 90, // px por encima del dedo
    touchDeadzone: 12,
};

// --- TECLADO ---
const keys = {};
const justPressed = {};
window.addEventListener('keydown', e => { if(!keys[e.code]) justPressed[e.code]=true; keys[e.code]=true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.code]=false; justPressed[e.code]=false; });
window.addEventListener('blur', () => { for(let k in keys){keys[k]=false;justPressed[k]=false;} });

// --- SISTEMA TÁCTIL ---
const touch = {
    active: false,
    id: -1,
    startX: 0, startY: 0,
    shipStartX: 0, shipStartY: 0,
    currentX: 0, currentY: 0,
    deltaX: 0, deltaY: 0,
    // Para el joystick visual
    visX: 0, visY: 0
};

document.addEventListener('touchstart', e => {
    // Ignorar toques en botones y overlays
    if (e.target.closest('#mobile-buttons') || e.target.closest('#overlay') || e.target.closest('#gameover')) return;
    if (touch.active) return;
    const t = e.changedTouches[0];
    touch.id = t.identifier;
    touch.active = true;
    touch.startX = t.clientX;
    touch.startY = t.clientY;
    if (G) {
        touch.shipStartX = G.player.x / sx();
        touch.shipStartY = G.player.y / sy();
    }
    touch.deltaX = 0;
    touch.deltaY = 0;
    joystickVis.style.left = t.clientX + 'px';
    joystickVis.style.top = t.clientY + 'px';
    joystickVis.classList.add('show');
    joystickThumb.style.transform = 'translate(-50%,-50%)';
}, { passive: false });

document.addEventListener('touchmove', e => {
    for (let t of e.changedTouches) {
        if (t.identifier === touch.id && touch.active) {
            e.preventDefault();
            const dx = t.clientX - touch.startX;
            const dy = t.clientY - touch.startY;
            touch.deltaX = dx;
            touch.deltaY = dy;
            touch.currentX = t.clientX;
            touch.currentY = t.clientY;
            // Joystick visual
            const clampDist = 30;
            const dist = Math.hypot(dx, dy);
            const cdx = dist > clampDist ? dx/dist*clampDist : dx;
            const cdy = dist > clampDist ? dy/dist*clampDist : dy;
            joystickThumb.style.transform = `translate(calc(-50% + ${cdx}px), calc(-50% + ${cdy}px))`;
        }
    }
}, { passive: false });

function endTouch(e) {
    for (let t of e.changedTouches) {
        if (t.identifier === touch.id) {
            touch.active = false;
            touch.id = -1;
            touch.deltaX = 0;
            touch.deltaY = 0;
            joystickVis.classList.remove('show');
        }
    }
}
document.addEventListener('touchend', endTouch);
document.addEventListener('touchcancel', endTouch);

// Botones
function setupBtn(id, code) {
    const el = $id(id);
    const start = e => { e.preventDefault(); e.stopPropagation(); if(!keys[code]){justPressed[code]=true;} keys[code]=true; el.classList.add('pressed'); };
    const end = e => { e.preventDefault(); keys[code]=false; justPressed[code]=false; el.classList.remove('pressed'); };
    el.addEventListener('touchstart', start, {passive:false});
    el.addEventListener('touchend', end, {passive:false});
    el.addEventListener('touchcancel', end, {passive:false});
}
setupBtn('btn-dash', 'ShiftLeft');
setupBtn('btn-bomb', 'KeyX');

// --- ESTRELLAS ---
let stars = [];
function initStars() {
    stars = [];
    for (let i = 0; i < 150; i++) {
        stars.push({ x: Math.random()*W, y: Math.random()*H, s: Math.random()*1.8+.5, sp: Math.random()*3+1 });
    }
}
initStars();

function drawStars() {
    for (const s of stars) {
        s.y += s.sp;
        if (s.y > H) { s.y = 0; s.x = Math.random()*W; }
        const a = .3 + Math.random()*.4;
        ctx.fillStyle = `rgba(255,255,255,${a})`;
        ctx.fillRect(s.x, s.y, s.s, s.s);
    }
}

// --- PARTÍCULAS ---
let particles = [];
function addParticles(x, y, color, count, spread, life) {
    spread = spread || 5; life = life || 25;
    for (let i = 0; i < count; i++) {
        const ang = Math.random()*Math.PI*2;
        const spd = Math.random()*spread + 1;
        particles.push({ x, y, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd, life, maxLife:life, color, size: Math.random()*3+1 });
    }
}
function addRing(x, y, color, radius) {
    particles.push({ x, y, vx:0, vy:0, life:15, maxLife:15, color, size:0, ring:true, ringR:radius||30 });
}
function updateParticles() {
    for (let i = particles.length-1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vx *= .96; p.vy *= .96;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }
}
function drawParticles() {
    for (const p of particles) {
        const a = p.life / p.maxLife;
        if (p.ring) {
            const r = p.ringR * (1 - a);
            ctx.strokeStyle = p.color;
            ctx.globalAlpha = a * .6;
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(1, r), 0, Math.PI*2); ctx.stroke();
        } else {
            ctx.globalAlpha = a;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
        }
    }
    ctx.globalAlpha = 1;
}

// --- TEXTOS FLOTANTES ---
let floats = [];
function addFloat(x, y, text, color, size) {
    floats.push({ x, y, text, color, size: size||14, life:50, maxLife:50 });
}
function updateFloats() {
    for (let i = floats.length-1; i >= 0; i--) {
        floats[i].y -= 1.5;
        floats[i].life--;
        if (floats[i].life <= 0) floats.splice(i, 1);
    }
}
function drawFloats() {
    for (const f of floats) {
        const a = f.life / f.maxLife;
        ctx.globalAlpha = a;
        ctx.fillStyle = f.color;
        ctx.font = `bold ${f.size}px 'Courier New',monospace`;
        ctx.textAlign = 'center';
        ctx.fillText(f.text, f.x, f.y);
    }
    ctx.globalAlpha = 1;
}

// --- ENEMIGOS ---
class Enemy {
    constructor(type) {
        this.type = type;
        this.x = 40 + Math.random()*(W/sx() - 80);
        this.y = -30;
        this.shootTimer = Math.floor(Math.random()*60);
        this.nearMissed = false;
        if (type === 'basic') { this.hp=1; this.speed=2.2; this.shootDelay=85; this.bSpd=3; this.size=1; this.pts=100; this.color='#cc3333'; }
        else if (type === 'fast') { this.hp=1; this.speed=4; this.shootDelay=65; this.bSpd=2.8; this.size=1; this.pts=150; this.color='#ff6633'; }
        else { this.hp=3; this.speed=1.2; this.shootDelay=95; this.bSpd=3.2; this.size=1.3; this.pts=250; this.color='#882222'; this.big=true; }
    }
    update(px, py) {
        this.y += this.speed;
        this.shootTimer--;
    }
    shoot(px, py) {
        const dx = px - this.x, dy = py - this.y;
        const d = Math.max(1, Math.hypot(dx, dy));
        return { x:this.x, y:this.y+15, vx:dx/d*this.bSpd, vy:dy/d*this.bSpd, nearMissed:false };
    }
}

// --- JUEGO PRINCIPAL ---
let G = null;
let animId = null;

class Game {
    constructor() {
        const pw = window.innerWidth, ph = window.innerHeight;
        this.player = { x: pw/2, y: ph - 100, w:30, h:30 };
        this.lives = 3;
        this.score = 0;
        this.kills = 0;
        this.level = 0;
        this.weaponLv = 1;
        this.bombs = 2;
        this.shield = false;
        this.invincible = 0;
        this.combo = 0;
        this.maxCombo = 0;
        this.comboTimer = 0;
        this.comboMult = 1;
        this.fever = false;
        this.dashCD = 0;
        this.dashing = false;
        this.dashTimer = 0;
        this.dashDx = 0;
        this.dashDy = 0;
        this.shake = 0;
        this.flash = 0;
        this.frame = 0;
        this.spawnTimer = 30;
        this.running = true;
        this.over = false;
        this.bossActive = false;
        this.boss = null;
        this.enemies = [];
        this.bullets = [];
        this.eBullets = [];
        this.powerups = [];
        this.beatRecord = false;
        this.newRecordShown = false;
        // Escala para dibujar
        this.sx = sx();
        this.sy = sy();
        // UI
        this.updateLivesUI();
        scoreEl.textContent = '0';
        bombBadge.textContent = this.bombs;
        levelEl.textContent = LEVELS[0].name;
        comboDisp.classList.remove('show');
        feverText.classList.remove('show');
        bossContainer.classList.remove('show');
    }

    toCanvas(lx, ly) { return [lx * this.sx, ly * this.sy]; }

    updateLivesUI() {
        livesEl.innerHTML = '';
        for (let i = 0; i < 3; i++) {
            const d = document.createElement('div');
            d.className = 'life' + (i >= this.lives ? ' lost' : '');
            livesEl.appendChild(d);
        }
    }

    comboMultiplier() {
        return Math.min(Math.floor(this.combo / 4) + 1, 12);
    }

    addCombo() {
        this.combo++;
        this.comboTimer = CFG.comboTimeout;
        this.comboMult = this.comboMultiplier();
        if (this.comboMult > this.maxCombo) this.maxCombo = this.comboMult;
        // Fever
        if (this.comboMult >= CFG.feverThreshold && !this.fever) {
            this.fever = true;
            feverText.classList.add('show');
            addFloat(this.player.x, this.player.y - 40, 'FEVER MODE!', '#ff3366', 22);
            vibratePattern();
        }
        if (this.comboMult > 1) {
            comboDisp.classList.add('show');
            comboText.textContent = `x${this.comboMult}`;
            comboText.style.color = this.comboMult >= CFG.feverThreshold ? '#ff3366' : '#ffaa00';
            comboFill.style.width = (this.comboTimer / CFG.comboTimeout * 100) + '%';
        }
    }

    breakCombo() {
        this.combo = 0;
        this.comboMult = 1;
        this.fever = false;
        comboDisp.classList.remove('show');
        feverText.classList.remove('show');
    }

    shoot() {
        const px = this.player.x, py = this.player.y;
        const count = Math.min(this.weaponLv + 1, 5);
        const spread = .18;
        const start = -spread * (count-1) / 2;
        const dmg = this.fever ? 2 : 1;
        for (let i = 0; i < count; i++) {
            const a = start + i * spread;
            this.bullets.push({ x:px, y:py-18, vx:Math.sin(a)*4, vy:-CFG.bulletSpeed, dmg, w:4, h:10 });
        }
    }

    useBomb() {
        if (this.bombs <= 0) return;
        this.bombs--;
        bombBadge.textContent = this.bombs;
        this.shake = 25;
        this.flash = .5;
        vibratePattern();
        // Daño a todos
        for (const e of this.enemies) {
            e.hp -= 50;
            addParticles(e.x*this.sx, e.y*this.sy, '#ff6600', 12, 6, 20);
        }
        if (this.bossActive && this.boss) {
            this.boss.hp -= 60;
            addParticles(this.boss.x*this.sx, this.boss.y*this.sy, '#ff0000', 20, 8, 25);
            if (this.boss.hp <= 0) this.defeatBoss();
            else this.updateBossUI();
        }
        this.enemies = this.enemies.filter(e => e.hp > 0);
        this.eBullets = [];
        addFloat(this.player.x, this.player.y - 30, 'BOMBA!', '#ff6600', 24);
        addRing(this.player.x*this.sx, this.player.y*this.sy, '#ffaa00', 80);
    }

    dash() {
        if (this.dashCD > 0 || this.dashing) return;
        let dx = 0, dy = 0;
        if (keys['ArrowLeft']) dx = -1;
        if (keys['ArrowRight']) dx = 1;
        if (keys['ArrowUp']) dy = -1;
        if (keys['ArrowDown']) dy = 1;
        if (dx === 0 && dy === 0) dy = -1;
        const len = Math.hypot(dx, dy);
        this.dashing = true;
        this.dashTimer = CFG.dashFrames;
        this.dashCD = CFG.dashCooldown;
        this.dashDx = dx/len * CFG.dashSpeed;
        this.dashDy = dy/len * CFG.dashSpeed;
        addParticles(this.player.x*this.sx, this.player.y*this.sy, '#00ddff', 12, 4, 15);
        vibrate(30);
    }

    killEnemy(enemy) {
        this.kills++;
        this.addCombo();
        const pts = enemy.pts * this.comboMult;
        this.score += pts;
        scoreEl.textContent = this.score.toLocaleString();
        addFloat(enemy.x, enemy.y, '+' + pts, this.comboMult >= 5 ? '#ff3366' : '#ffaa00', this.comboMult >= 5 ? 18 : 14);
        addParticles(enemy.x*this.sx, enemy.y*this.sy, '#ffff00', 10, 5, 18);
        addRing(enemy.x*this.sx, enemy.y*this.sy, '#ffaa00', 25);
        vibrate(40);
        // Powerup drop
        if (Math.random() < .18) this.spawnPowerup(enemy.x, enemy.y);
        // Verificar new record
        if (!this.newRecordShown && this.score > getHS()) {
            this.newRecordShown = true;
            recordFlash.style.opacity = '1';
            setTimeout(() => recordFlash.style.opacity = '0', 1500);
            vibratePattern();
        }
        // Verificar boss
        if (this.kills >= LEVELS[this.level].killsNeeded && !this.bossActive) {
            this.spawnBoss();
        }
    }

    spawnPowerup(x, y) {
        const r = Math.random();
        let type, color, sym;
        if (r < .45) { type='weapon'; color='#00ddff'; sym='W'; }
        else if (r < .75) { type='shield'; color='#00ff88'; sym='S'; }
        else { type='bomb'; color='#ffaa00'; sym='B'; }
        this.powerups.push({ x, y, type, color, sym, t:0 });
    }

    spawnBoss() {
        this.bossActive = true;
        const lv = LEVELS[this.level];
        this.boss = { x: window.innerWidth/2, y: 80, w:100, h:80, hp:lv.bossHP, maxHp:lv.bossHP, dir:1, atkTimer:60, tentacles: Array.from({length:5},(_,i)=>({a:Math.PI/5*i,l:0})) };
        bossContainer.classList.add('show');
        this.updateBossUI();
        addFloat(window.innerWidth/2, 130, 'JEFE APARECE!', '#ff3366', 26);
        vibratePattern();
    }

    updateBossUI() {
        if (!this.boss) return;
        const pct = Math.max(0, this.boss.hp / this.boss.maxHp * 100);
        bossFill.style.width = pct + '%';
    }

    defeatBoss() {
        this.bossActive = false;
        bossContainer.classList.remove('show');
        const bonus = 5000 * this.comboMult;
        this.score += bonus;
        scoreEl.textContent = this.score.toLocaleString();
        addFloat(window.innerWidth/2, window.innerHeight/2, 'VICTORIA +' + bonus, '#ffaa00', 28);
        addParticles(this.boss.x*this.sx, this.boss.y*this.sy, '#ffaa00', 40, 8, 30);
        addRing(this.boss.x*this.sx, this.boss.y*this.sy, '#ff3366', 100);
        this.shake = 20;
        vibratePattern();
        this.boss = null;
        this.level++;
        if (this.level >= LEVELS.length) {
            this.win();
        } else {
            levelEl.textContent = LEVELS[this.level].name;
            this.kills = 0;
            this.spawnTimer = 0;
            if (this.weaponLv < 5) {
                this.weaponLv++;
                addFloat(this.player.x, this.player.y - 40, 'ARMA NIVEL ' + this.weaponLv, '#00ddff', 18);
            }
            addFloat(window.innerWidth/2, 100, 'NIVEL ' + (this.level+1), '#00ff88', 26);
        }
    }

    takeDamage() {
        if (this.invincible > 0 || this.dashing) return;
        if (this.shield) {
            this.shield = false;
            shieldEl.classList.remove('show');
            addFloat(this.player.x, this.player.y, 'ESCUDO ROTO', '#ffaa00', 14);
            this.invincible = 25;
            vibrate(50);
            addParticles(this.player.x*this.sx, this.player.y*this.sy, '#00ff88', 15, 5, 15);
            return;
        }
        this.lives--;
        this.updateLivesUI();
        this.breakCombo();
        this.invincible = 50;
        this.shake = 18;
        this.flash = .3;
        addParticles(this.player.x*this.sx, this.player.y*this.sy, '#ff0000', 25, 6, 20);
        addRing(this.player.x*this.sx, this.player.y*this.sy, '#ff0000', 40);
        vibrate(100);
        if (this.lives <= 0) this.die();
    }

    die() {
        this.over = true;
        this.running = false;
        const name = getUserName();
        localStorage.setItem('sa_name', name);
        this.beatRecord = setHS(this.score, name);
        showRecords();
        showHSDisplay(name);
        // Mostrar game over
        setTimeout(() => {
            goStats.innerHTML = `
                <p class="big">${this.score.toLocaleString()}</p>
                <p class="record">${this.beatRecord ? 'NUEVO RECORD!' : 'RECORD: ' + getHS(name).toLocaleString()}</p>
                <p>ELIMINACIONES: ${this.kills}</p>
                <p>COMBO MAX: x${this.maxCombo}</p>
                <p>NIVEL: ${this.level + 1}</p>
            `;
            goEl.classList.remove('hidden');
        }, 600);
    }

    win() {
        this.over = true;
        this.running = false;
        const name = getUserName();
        localStorage.setItem('sa_name', name);
        this.beatRecord = setHS(this.score, name);
        showRecords();
        showHSDisplay(name);
        $id('go-title').textContent = 'VICTORIA!';
        $id('go-title').style.color = 'var(--accent)';
        $id('go-title').style.textShadow = '0 0 30px var(--accent)';
        setTimeout(() => {
            goStats.innerHTML = `
                <p class="big">${this.score.toLocaleString()}</p>
                <p class="record">${this.beatRecord ? 'NUEVO RECORD!' : 'RECORD: ' + getHS(name).toLocaleString()}</p>
                <p>JUEGO COMPLETADO!</p>
                <p>ELIMINACIONES: ${this.kills}</p>
                <p>COMBO MAX: x${this.maxCombo}</p>
            `;
            goEl.classList.remove('hidden');
        }, 600);
    }

    update() {
        if (!this.running) return;
        this.frame++;
        this.sx = sx();
        this.sy = sy();

        // Invencibilidad
        if (this.invincible > 0) this.invincible--;
        if (this.shake > 0) this.shake--;
        if (this.flash > 0) this.flash -= .025;

        // Dash
        if (this.dashCD > 0) { this.dashCD--; dashCdFill.style.width = ((1 - this.dashCD/CFG.dashCooldown)*100)+'%'; }
        else dashCdFill.style.width = '100%';
        if (this.dashing) {
            this.dashTimer--;
            this.player.x += this.dashDx;
            this.player.y += this.dashDy;
            if (this.dashTimer <= 0) this.dashing = false;
        }

        // Combo timer
        if (this.comboTimer > 0) {
            this.comboTimer--;
            comboFill.style.width = (this.comboTimer / CFG.comboTimeout * 100) + '%';
            if (this.comboTimer <= 0) this.breakCombo();
        }

        // --- MOVIMIENTO JUGADOR ---
        if (!this.dashing) {
            const spd = CFG.playerSpeed;
            // Teclado
            if (keys['ArrowLeft']) this.player.x -= spd;
            if (keys['ArrowRight']) this.player.x += spd;
            if (keys['ArrowUp']) this.player.y -= spd;
            if (keys['ArrowDown']) this.player.y += spd;
            // Táctil
            if (touch.active) {
                const tx = touch.shipStartX + touch.deltaX;
                const ty = touch.shipStartY + touch.deltaY;
                // Lerp suave hacia objetivo
                this.player.x += (tx - this.player.x) * .35;
                this.player.y += (ty - this.player.y) * .35;
            }
        }
        // Clamp
        const pw = window.innerWidth, ph = window.innerHeight;
        this.player.x = Math.max(18, Math.min(pw - 18, this.player.x));
        this.player.y = Math.max(60, Math.min(ph - 40, this.player.y));

        // Auto-disparo
        if (this.frame % CFG.fireRate === 0) this.shoot();

        // Bomba
        if (justPressed['KeyX']) { this.useBomb(); justPressed['KeyX'] = false; }
        // Dash
        if (justPressed['ShiftLeft']) { this.dash(); justPressed['ShiftLeft'] = false; }

        // --- SPAWN ENEMIGOS ---
        if (!this.bossActive) {
            this.spawnTimer--;
            if (this.spawnTimer <= 0 && this.enemies.length < LEVELS[this.level].maxE) {
                const types = ['basic','basic','basic','fast','fast','tank'];
                this.enemies.push(new Enemy(types[Math.floor(Math.random()*types.length)]));
                this.spawnTimer = LEVELS[this.level].spawnDelay;
            }
        }

        // --- ACTUALIZAR ENEMIGOS ---
        const px = this.player.x, py = this.player.y;
        for (let i = this.enemies.length-1; i >= 0; i--) {
            const e = this.enemies[i];
            e.update(px, py);
            // Disparar
            if (e.shootTimer <= 0 && e.y > 10 && e.y < ph - 100) {
                this.eBullets.push(e.shoot(px, py));
                e.shootTimer = e.shootDelay;
            }
            // Fuera de pantalla
            if (e.y > ph + 50) { this.enemies.splice(i, 1); continue; }
            // Colisión con jugador
            if (!this.dashing && this.invincible <= 0) {
                if (Math.abs(px - e.x) < 22 && Math.abs(py - e.y) < 22) {
                    this.takeDamage();
                    addParticles(e.x*this.sx, e.y*this.sy, '#ff6600', 10, 5, 15);
                    this.enemies.splice(i, 1);
                }
            }
        }

        // --- BALAS JUGADOR ---
        for (let i = this.bullets.length-1; i >= 0; i--) {
            const b = this.bullets[i];
            b.x += b.vx; b.y += b.vy;
            if (b.y < -20 || b.x < -20 || b.x > pw+20) { this.bullets.splice(i, 1); continue; }
            // Hit enemigos
            let hit = false;
            for (let j = this.enemies.length-1; j >= 0; j--) {
                const e = this.enemies[j];
                if (Math.abs(b.x - e.x) < 22 && Math.abs(b.y - e.y) < 22) {
                    e.hp -= b.dmg;
                    addParticles(b.x*this.sx, b.y*this.sy, '#ffcc00', 3, 2, 8);
                    if (e.hp <= 0) { this.killEnemy(e); this.enemies.splice(j, 1); }
                    hit = true; break;
                }
            }
            // Hit boss
            if (!hit && this.bossActive && this.boss) {
                const bo = this.boss;
                if (Math.abs(b.x - bo.x) < bo.w/2 && Math.abs(b.y - bo.y) < bo.h/2) {
                    bo.hp -= b.dmg;
                    this.updateBossUI();
                    addParticles(b.x*this.sx, b.y*this.sy, '#ffaa00', 3, 2, 8);
                    if (bo.hp <= 0) this.defeatBoss();
                    hit = true;
                }
            }
            if (hit) this.bullets.splice(i, 1);
        }

        // --- BALAS ENEMIGAS ---
        for (let i = this.eBullets.length-1; i >= 0; i--) {
            const b = this.eBullets[i];
            b.x += b.vx; b.y += b.vy;
            if (b.y > ph+20 || b.y < -20 || b.x < -20 || b.x > pw+20) { this.eBullets.splice(i, 1); continue; }
            // Hit jugador
            if (!this.dashing && this.invincible <= 0) {
                if (Math.abs(px - b.x) < 14 && Math.abs(py - b.y) < 14) {
                    this.takeDamage();
                    this.eBullets.splice(i, 1);
                    continue;
                }
            }
            // Near miss
            if (!b.nearMissed && !this.dashing) {
                const d = Math.hypot(px - b.x, py - b.y);
                if (d < CFG.nearMissDist && d > 14) {
                    b.nearMissed = true;
                    const bonus = CFG.nearMissBonus * this.comboMult;
                    this.score += bonus;
                    scoreEl.textContent = this.score.toLocaleString();
                    addFloat(b.x, b.y - 10, 'NEAR! +' + bonus, '#00ff88', 12);
                    addParticles(b.x*this.sx, b.y*this.sy, '#00ff88', 4, 2, 10);
                    vibrate(15);
                }
            }
        }

        // --- POWERUPS ---
        for (let i = this.powerups.length-1; i >= 0; i--) {
            const p = this.powerups[i];
            p.y += 1.8;
            p.t++;
            if (p.y > ph + 20) { this.powerups.splice(i, 1); continue; }
            if (Math.abs(px - p.x) < 22 && Math.abs(py - p.y) < 22) {
                if (p.type === 'weapon' && this.weaponLv < 5) {
                    this.weaponLv++;
                    addFloat(px, py - 30, 'ARMA NV.' + this.weaponLv, '#00ddff', 16);
                } else if (p.type === 'shield') {
                    this.shield = true;
                    shieldEl.classList.add('show');
                    addFloat(px, py - 30, 'ESCUDO!', '#00ff88', 16);
                } else if (p.type === 'bomb') {
                    this.bombs++;
                    bombBadge.textContent = this.bombs;
                    addFloat(px, py - 30, 'BOMBA +1', '#ffaa00', 16);
                }
                addParticles(p.x*this.sx, p.y*this.sy, p.color, 10, 4, 15);
                addRing(p.x*this.sx, p.y*this.sy, p.color, 20);
                vibrate(25);
                this.powerups.splice(i, 1);
            }
        }

        // --- BOSS ---
        if (this.bossActive && this.boss) {
            const bo = this.boss;
            bo.x += bo.dir * 2.5;
            if (bo.x < 80 || bo.x > pw - 80) bo.dir *= -1;
            bo.atkTimer--;
            if (bo.atkTimer <= 0) {
                const n = this.fever ? 7 : 5;
                for (let i = 0; i < n; i++) {
                    const a = Math.PI*2/n * i + this.frame * .04;
                    this.eBullets.push({ x:bo.x, y:bo.y+40, vx:Math.cos(a)*4, vy:Math.sin(a)*4+2, nearMissed:false });
                }
                bo.atkTimer = this.fever ? 45 : 55;
                vibrate(30);
            }
            bo.tentacles.forEach((t,i) => {
                t.a += .04 * (i%2?1:-1);
                t.l = 40 + 20*Math.sin(this.frame*.05+i);
            });
            // Colisión directa con boss
            if (!this.dashing && this.invincible <= 0) {
                if (Math.abs(px - bo.x) < 40 && Math.abs(py - bo.y) < 35) {
                    this.takeDamage();
                }
            }
        }

        updateParticles();
        updateFloats();
    }

    draw() {
        ctx.save();
        // Screen shake
        if (this.shake > 0) {
            ctx.translate((Math.random()-.5)*this.shake*2, (Math.random()-.5)*this.shake*2);
        }
        // Fondo
        const lv = LEVELS[this.level];
        const grad = ctx.createLinearGradient(0,0,0,H);
        grad.addColorStop(0, lv.bg[0]);
        grad.addColorStop(.4, lv.bg[1]);
        grad.addColorStop(.7, lv.bg[2]);
        grad.addColorStop(1, lv.bg[3]);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        // Fever fondo
        if (this.fever) {
            ctx.fillStyle = `rgba(255,0,50,${.04 + .03*Math.sin(this.frame*.15)})`;
            ctx.fillRect(0, 0, W, H);
        }

        drawStars();

        // Powerups
        for (const p of this.powerups) {
            const [cx, cy] = this.toCanvas(p.x, p.y);
            const pulse = 1 + .15*Math.sin(p.t*.1);
            ctx.save();
            ctx.translate(cx, cy);
            ctx.scale(pulse, pulse);
            ctx.fillStyle = p.color;
            ctx.globalAlpha = .8;
            ctx.font = 'bold 18px "Courier New",monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(p.sym, 0, 0);
            // Glow
            ctx.globalAlpha = .2;
            ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }

        // Enemigos
        for (const e of this.enemies) this.drawEnemy(e);

        // Boss
        if (this.bossActive && this.boss) this.drawBoss();

        // Balas jugador
        ctx.fillStyle = '#00ddff';
        for (const b of this.bullets) {
            const [bx, by] = this.toCanvas(b.x, b.y);
            ctx.globalAlpha = .9;
            ctx.fillRect(bx - 2, by - 5, 4, 10);
            ctx.globalAlpha = .3;
            ctx.fillRect(bx - 4, by - 3, 8, 14);
        }
        ctx.globalAlpha = 1;

        // Balas enemigas
        for (const b of this.eBullets) {
            const [bx, by] = this.toCanvas(b.x, b.y);
            ctx.fillStyle = '#ff3366';
            ctx.beginPath(); ctx.arc(bx, by, 5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'rgba(255,51,102,.25)';
            ctx.beginPath(); ctx.arc(bx, by, 9, 0, Math.PI*2); ctx.fill();
        }

        drawParticles();
        drawFloats();

        // Jugador
        this.drawPlayer();

        // Escudo
        if (this.shield) {
            const [px, py] = this.toCanvas(this.player.x, this.player.y);
            ctx.strokeStyle = '#00ff88';
            ctx.lineWidth = 2;
            ctx.globalAlpha = .5 + .3*Math.sin(this.frame*.1);
            ctx.beginPath(); ctx.arc(px, py, 26, 0, Math.PI*2); ctx.stroke();
            ctx.globalAlpha = 1;
        }

        // Dash trail
        if (this.dashing) {
            const [px, py] = this.toCanvas(this.player.x, this.player.y);
            const [tx, ty] = this.toCanvas(this.player.x - this.dashDx*3, this.player.y - this.dashDy*3);
            ctx.strokeStyle = 'rgba(0,221,255,.5)';
            ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(px, py); ctx.stroke();
        }

        // Flash
        if (this.flash > 0) {
            ctx.fillStyle = `rgba(255,255,255,${this.flash})`;
            ctx.fillRect(0, 0, W, H);
        }

        ctx.restore();
    }

    drawPlayer() {
        const p = this.player;
        if (this.invincible > 0 && this.frame%6 < 3) return;
        const [cx, cy] = this.toCanvas(p.x, p.y);
        ctx.save();
        ctx.translate(cx, cy);
        // Cuerpo
        ctx.fillStyle = '#e0e0e0';
        ctx.beginPath();
        ctx.moveTo(0, -18);
        ctx.bezierCurveTo(8, -8, 10, 8, 6, 18);
        ctx.lineTo(-6, 18);
        ctx.bezierCurveTo(-10, 8, -8, -8, 0, -18);
        ctx.fill();
        // Cabina
        ctx.fillStyle = '#88ccff';
        ctx.beginPath(); ctx.ellipse(0, -8, 6, 8, 0, 0, Math.PI*2); ctx.fill();
        // Alas
        ctx.fillStyle = '#bbb';
        ctx.beginPath(); ctx.moveTo(-5, 3); ctx.lineTo(-16, 14); ctx.lineTo(-12, 20); ctx.lineTo(-3, 15); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(5, 3); ctx.lineTo(16, 14); ctx.lineTo(12, 20); ctx.lineTo(3, 15); ctx.closePath(); ctx.fill();
        // Colas
        ctx.fillStyle = '#999';
        ctx.beginPath(); ctx.moveTo(-3, 14); ctx.lineTo(-10, 20); ctx.lineTo(-3, 18); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(3, 14); ctx.lineTo(10, 20); ctx.lineTo(3, 18); ctx.closePath(); ctx.fill();
        // Motor
        ctx.fillStyle = `rgba(0,200,255,${.5 + Math.random()*.3})`;
        ctx.beginPath(); ctx.ellipse(0, 22, 4, 6 + Math.random()*5, 0, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }

    drawEnemy(e) {
        const [cx, cy] = this.toCanvas(e.x, e.y);
        const s = (e.size || 1) * this.sx;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.scale(s, s);
        // Sombra
        ctx.fillStyle = 'rgba(0,0,0,.15)';
        ctx.beginPath(); ctx.ellipse(3, 3, 18, 15, 0, 0, Math.PI*2); ctx.fill();
        // Cuerpo
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.moveTo(0, -18);
        ctx.bezierCurveTo(8, -8, 9, 8, 5, 20);
        ctx.lineTo(-5, 20);
        ctx.bezierCurveTo(-9, 8, -8, -8, 0, -18);
        ctx.fill();
        // Detalle
        ctx.fillStyle = e.big ? '#ff6644' : '#ff8866';
        ctx.beginPath(); ctx.ellipse(0, 8, 5, 6, 0, 0, Math.PI*2); ctx.fill();
        // Alas
        ctx.fillStyle = e.big ? '#661100' : '#881100';
        ctx.beginPath(); ctx.moveTo(-4, 3); ctx.lineTo(-22, 12); ctx.lineTo(-18, 18); ctx.lineTo(-3, 14); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(4, 3); ctx.lineTo(22, 12); ctx.lineTo(18, 18); ctx.lineTo(3, 14); ctx.closePath(); ctx.fill();
        // Ojos
        ctx.fillStyle = '#ffff00';
        ctx.beginPath(); ctx.arc(-5, 4, 2.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(5, 4, 2.5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(-4.5, 4, 1.2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(5.5, 4, 1.2, 0, Math.PI*2); ctx.fill();
        // Barra HP para tanques
        if (e.big) {
            const pct = Math.max(0, e.hp / 3);
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(-16, -26, 32*pct, 3);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = .5;
            ctx.strokeRect(-16, -26, 32, 3);
        }
        ctx.restore();
    }

    drawBoss() {
        const bo = this.boss;
        const [cx, cy] = this.toCanvas(bo.x, bo.y);
        const pulse = 1 + .03*Math.sin(this.frame*.1);
        ctx.save();
        ctx.translate(cx, cy);
        ctx.scale(pulse * this.sx, pulse * this.sy);
        // Aura
        ctx.fillStyle = 'rgba(120,0,200,.1)';
        ctx.beginPath(); ctx.ellipse(0, 0, 70, 50, 0, 0, Math.PI*2); ctx.fill();
        // Cuerpo principal
        ctx.fillStyle = '#220044';
        ctx.beginPath(); ctx.ellipse(0, -10, 48, 32, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(180,0,255,.5)';
        ctx.beginPath(); ctx.ellipse(0, -16, 26, 20, 0, Math.PI, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#440088';
        ctx.beginPath(); ctx.ellipse(0, 10, 42, 16, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#6600cc';
        ctx.beginPath(); ctx.ellipse(0, 8, 34, 10, 0, 0, Math.PI*2); ctx.fill();
        // Luces
        for (let i = 0; i < 8; i++) {
            const a = i/8*Math.PI*2 + this.frame*.05;
            ctx.fillStyle = i%2 ? '#ff00ff' : '#00ffff';
            ctx.beginPath(); ctx.arc(Math.cos(a)*34, 10+Math.sin(a)*8, 3.5, 0, Math.PI*2); ctx.fill();
        }
        // Tentáculos
        bo.tentacles.forEach((t,i) => {
            const ax = Math.cos(t.a)*28, ay = 18+Math.sin(t.a)*12;
            const bx = ax+Math.cos(t.a+.5)*t.l, by = ay+Math.sin(t.a+.5)*t.l+18;
            ctx.strokeStyle = 'rgba(180,0,255,.6)';
            ctx.lineWidth = 3.5;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(ax, ay);
            ctx.quadraticCurveTo(ax+(bx-ax)*.5+15*Math.sin(this.frame*.1+i), ay+(by-ay)*.5, bx, by);
            ctx.stroke();
            ctx.fillStyle = '#cc00ff';
            ctx.beginPath(); ctx.arc(bx, by, 4, 0, Math.PI*2); ctx.fill();
        });
        ctx.restore();
    }
}

// --- LOOP ---
function gameLoop() {
    if (G && G.running) {
        G.update();
        G.draw();
    }
    animId = requestAnimationFrame(gameLoop);
}

function startGame() {
    // Reset UI
    $id('go-title').textContent = 'GAME OVER';
    $id('go-title').style.color = '';
    $id('go-title').style.textShadow = '';
    goEl.classList.add('hidden');
    overlayEl.classList.add('hidden');
    particles = [];
    floats = [];
    G = new Game();
    if (!animId) gameLoop();
}

// --- EVENTOS ---
 $id('btn-play').addEventListener('click', startGame);
 $id('btn-retry').addEventListener('click', startGame);
 $id('btn-menu').addEventListener('click', () => {
    goEl.classList.add('hidden');
    overlayEl.classList.remove('hidden');
    G = null;
    showRecords();
    showHSDisplay();
});
// Prevenir zoom en iOS
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('dblclick', e => e.preventDefault());

// Dibujar fondo mientras está en menú
function menuLoop() {
    if (!G || !G.running) {
        const grad = ctx.createLinearGradient(0,0,0,H);
        grad.addColorStop(0, '#06060c');
        grad.addColorStop(1, '#0a0818');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
        drawStars();
    }
    if (!animId) requestAnimationFrame(menuLoop);
}
menuLoop();
</script>
