<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TURBO ASFALTO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Orbitron',monospace}
#wrap{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}
#gameCanvas{display:block}
#ui{position:absolute;top:0;left:50%;transform:translateX(-50%);width:var(--gw,360px);pointer-events:none;z-index:10}
#hud{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 10px 0}
#left-hud{display:flex;flex-direction:column;gap:4px}
#speed-label{font-size:9px;color:#888;letter-spacing:2px}
#speed-val{font-size:24px;font-weight:900;color:#f0c020;line-height:1;text-shadow:0 0 12px rgba(240,192,32,0.67)}
#speed-unit{font-size:8px;color:#888;letter-spacing:1px}
#fuel-wrap{margin-top:4px}
#fuel-label{font-size:8px;color:#888;letter-spacing:2px;margin-bottom:2px}
#fuel-bar{width:70px;height:6px;background:#222;border:1px solid #444;border-radius:2px;overflow:hidden}
#fuel-fill{height:100%;background:linear-gradient(90deg,#0f8,#0f4);width:100%;transition:width .1s}
#right-hud{text-align:right}
#score{font-size:18px;font-weight:700;color:#fff;text-shadow:0 0 8px rgba(0,255,255,0.53)}
#hi-score{font-size:9px;color:#555;margin-bottom:2px;letter-spacing:1px}
#stage-tag{font-size:9px;color:#f0c020;letter-spacing:3px;margin-top:3px}
#lives-row{display:flex;justify-content:flex-end;gap:4px;margin-top:4px}
.life-car{width:10px;height:16px;background:#e8e0d0;border:1px solid #aaa;border-radius:2px;position:relative}
.life-car::after{content:'';position:absolute;top:30%;left:20%;width:60%;height:30%;background:rgba(200,50,50,0.7);border-radius:1px}
#boss-bar-wrap{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:var(--gw,360px);padding:6px 10px;display:none}
#boss-name{font-size:9px;color:#f33;letter-spacing:3px;margin-bottom:3px;text-align:center}
#boss-track{background:#1a0000;height:10px;border:1px solid #f33;border-radius:3px;overflow:hidden}
#controls{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:15}
.ctrl-btn{background:rgba(0,0,0,0.7);border:2px solid #f0c020;color:#f0c020;font-family:'Orbitron',monospace;font-size:12px;padding:10px 15px;cursor:pointer;border-radius:5px;min-width:60px;text-align:center}
.ctrl-btn:active{background:#f0c020;color:#000}
.ctrl-btn:disabled{background:#333;border-color:#666;color:#666}
#overlay-inner{background:rgba(0,0,0,0.92);border:1px solid #333;padding:32px 28px;text-align:center;width:100%}
#overlay h1{font-size:32px;font-weight:900;color:#f0c020;letter-spacing:4px;text-shadow:0 0 20px rgba(240,192,32,0.4);margin-bottom:6px}
#overlay .sub{font-size:10px;color:#555;letter-spacing:3px;margin-bottom:20px}
#overlay p{color:#888;font-size:11px;line-height:1.9;margin-bottom:22px;letter-spacing:1px}
.obtn{background:transparent;border:1px solid #f0c020;color:#f0c020;font-family:'Orbitron',monospace;font-size:12px;letter-spacing:4px;padding:10px 28px;cursor:pointer;transition:all .2s;display:block;margin:6px auto}
.obtn:hover{background:#f0c020;color:#000}
.obtn.sm{font-size:9px;padding:6px 16px;letter-spacing:2px}
#shop{display:none;background:rgba(0,0,0,0.95);border:1px solid #f0c020;padding:20px;width:100%}
#shop h2{color:#f0c020;font-size:14px;letter-spacing:3px;margin-bottom:4px}
#shop-coins{color:#0f8;font-size:12px;margin-bottom:14px}
.si{display:flex;justify-content:space-between;align-items:center;padding:8px;border:1px solid #333;margin-bottom:6px}
.si .nm{color:#ccc;font-size:9px;letter-spacing:1px}
.si .ds{color:#666;font-size:7px;margin-top:2px}
.si .lv{color:#f0c020;font-size:8px}
.sbtn{background:transparent;border:1px solid #0f8;color:#0f8;font-family:'Orbitron',monospace;font-size:8px;padding:4px 10px;cursor:pointer;transition:all .2s}
.sbtn:hover{background:#0f8;color:#000}
.sbtn:disabled{border-color:#333;color:#333;cursor:default}
.sbtn:disabled:hover{background:transparent;color:#333}
#stage-flash{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;font-weight:900;color:#f0c020;letter-spacing:6px;text-shadow:0 0 30px #f0c020;text-align:center;opacity:0;pointer-events:none;z-index:30;white-space:nowrap}
</style>
</head>
<body>
<div id="wrap">
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div id="hud">
    <div id="left-hud">
      <div id="speed-label">VELOCIDAD</div>
      <div><span id="speed-val">0</span> <span id="speed-unit">km/h</span></div>
      <div id="fuel-wrap"><div id="fuel-label">COMBUSTIBLE</div><div id="fuel-bar"><div id="fuel-fill"></div></div></div>
    </div>
    <div id="right-hud">
      <div id="hi-score">RECORD: <span id="hi-val">0</span></div>
      <div id="score">0</div>
      <div id="stage-tag">ETAPA 1</div>
      <div id="lives-row"></div>
    </div>
  </div>
  <div id="boss-bar-wrap"><div id="boss-name">JEFE DE ETAPA</div><div id="boss-track"><div id="boss-fill" style="width:100%"></div></div></div>
</div>
<div id="controls">
  <button id="brakeBtn" class="ctrl-btn">FRENO</button>
  <button id="shootBtn" class="ctrl-btn">DISPARAR</button>
  <button id="turboBtn" class="ctrl-btn">TURBO</button>
</div>
<div id="overlay">
  <div id="overlay-inner">
    <div class="sub">PRESENTA</div>
    <h1>TURBO<br>ASFALTO</h1>
    <p>Flechas para doblar · Arriba TURBO · Abajo freno<br>ESPACIO dispara · esquiva de cerca = puntos<br>Toque izquierda/derecha para doblar · Botones abajo<br>¡destruye trafico y derrota jefes!</p>
    <button id="startBtn" class="obtn">ARRANCAR</button>
  </div>
  <div id="shop">
    <h2>TALLER</h2>
    <div id="shop-coins">CREDITOS: <span id="shop-coins-val">0</span></div>
    <div id="shop-items"></div>
    <button id="shopContinue" class="obtn sm">CONTINUAR</button>
  </div>
</div>
<div id="stage-flash"></div>
</div>
<script>
/* ===== SETUP ===== */
const C=document.getElementById('gameCanvas'),X=C.getContext('2d'),W=document.getElementById('wrap');
const GW=360,GH=600;let sc=1;
function resize(){const a=window.innerWidth,b=window.innerHeight;sc=Math.min(a/GW,b/GH);C.width=GW;C.height=GH;C.style.width=(GW*sc)+'px';C.style.height=(GH*sc)+'px';W.style.setProperty('--gw',(GW*sc)+'px');['ui','overlay'].forEach(id=>{document.getElementById(id).style.width=(GW*sc)+'px'})}
resize();window.addEventListener('resize',resize);

/* ===== AUDIO (Web Audio API procedural) ===== */
const AC=window.AudioContext||window.webkitAudioContext;let ac=null;
function initAudio(){if(!ac)ac=new AC()}
function snd(type,p={}){
  if(!ac)return;const t=ac.currentTime;
  try{
  if(type==='shoot'){const o=ac.createOscillator(),g=ac.createGain();o.type='square';o.frequency.setValueAtTime(900,t);o.frequency.exponentialRampToValueAtTime(400,t+0.07);g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.07);o.connect(g).connect(ac.destination);o.start(t);o.stop(t+0.07)}
  else if(type==='explode'){const n=ac.sampleRate*0.25|0,b=ac.createBuffer(1,n,ac.sampleRate),d=b.getChannelData(0);for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);const s=ac.createBufferSource(),g=ac.createGain(),f=ac.createBiquadFilter();f.type='lowpass';f.frequency.setValueAtTime(p.freq||600,t);f.frequency.exponentialRampToValueAtTime(80,t+0.25);s.buffer=b;g.gain.setValueAtTime(p.vol||0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.25);s.connect(f).connect(g).connect(ac.destination);s.start(t)}
  else if(type==='pickup'){[523,659,784].forEach((fr,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.setValueAtTime(fr,t+i*0.05);g.gain.setValueAtTime(0.07,t+i*0.05);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.05+0.12);o.connect(g).connect(ac.destination);o.start(t+i*0.05);o.stop(t+i*0.05+0.12)})}
  else if(type==='nearmiss'){const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.setValueAtTime(280,t);o.frequency.exponentialRampToValueAtTime(700,t+0.1);g.gain.setValueAtTime(0.06,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.12);o.connect(g).connect(ac.destination);o.start(t);o.stop(t+0.12)}
  else if(type==='hit'){const o=ac.createOscillator(),g=ac.createGain();o.type='sawtooth';o.frequency.setValueAtTime(160,t);o.frequency.exponentialRampToValueAtTime(40,t+0.25);g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.25);o.connect(g).connect(ac.destination);o.start(t);o.stop(t+0.25)}
  else if(type==='combo'){const bf=400+Math.min(p.n||1,12)*70;const o=ac.createOscillator(),g=ac.createGain();o.type='triangle';o.frequency.setValueAtTime(bf,t);o.frequency.exponentialRampToValueAtTime(bf*1.5,t+0.12);g.gain.setValueAtTime(0.09,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.18);o.connect(g).connect(ac.destination);o.start(t);o.stop(t+0.18)}
  else if(type==='bosswarn'){for(let i=0;i<3;i++){const o=ac.createOscillator(),g=ac.createGain();o.type='square';o.frequency.setValueAtTime(90,t+i*0.25);g.gain.setValueAtTime(0.1,t+i*0.25);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.25+0.18);o.connect(g).connect(ac.destination);o.start(t+i*0.25);o.stop(t+i*0.25+0.18)}}
  else if(type==='lvlup'){[523,659,784,1047].forEach((fr,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.setValueAtTime(fr,t+i*0.08);g.gain.setValueAtTime(0.09,t+i*0.08);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.08+0.25);o.connect(g).connect(ac.destination);o.start(t+i*0.08);o.stop(t+i*0.08+0.25)})}
  else if(type==='pwrup'){const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.setValueAtTime(400,t);o.frequency.exponentialRampToValueAtTime(1400,t+0.25);g.gain.setValueAtTime(0.09,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.3);o.connect(g).connect(ac.destination);o.start(t);o.stop(t+0.3)}
  else if(type==='fever'){const o=ac.createOscillator(),g=ac.createGain();o.type='sawtooth';o.frequency.setValueAtTime(80,t);o.frequency.setValueAtTime(120,t+0.05);o.frequency.setValueAtTime(80,t+0.1);g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);o.connect(g).connect(ac.destination);o.start(t);o.stop(t+0.2)}
  }catch(e){}
}

/* ===== SCREEN SHAKE ===== */
let skX=0,skY=0,skI=0;
function shake(i){skI=Math.max(skI,i)}
function updShake(){if(skI>0.5){skX=(Math.random()-0.5)*skI;skY=(Math.random()-0.5)*skI;skI*=0.82}else{skX=skY=skI=0}}

/* ===== ETAPAS ===== */
const STAGES=[
  {name:'ETAPA 1 · AUTOPISTA',tag:'AUTOPISTA',roadC:'#2a2a2a',lineC:'#f0c020',shL:'#3a6a3a',shR:'#3a6a3a',sky:['#1a3a5a','#0a1a2a'],bg:'trees',tColors:['#c0392b','#2980b9','#f39c12','#8e44ad','#27ae60','#e67e22'],spdBase:3,spawnR:85,killsBoss:20,bossName:'CAMION FANTASMA',bgSpd:1.2,fuelCh:0.08},
  {name:'ETAPA 2 · DESIERTO',tag:'DESIERTO',roadC:'#3a2a1a',lineC:'#ff8800',shL:'#c8a84b',shR:'#c8a84b',sky:['#c0501a','#801a00'],bg:'cactus',tColors:['#8B4513','#A0522D','#D2691E','#CD853F','#ff4400','#ffaa00'],spdBase:4.2,spawnR:65,killsBoss:25,bossName:'TREN DEL DESIERTO',bgSpd:1.5,fuelCh:0.06},
  {name:'ETAPA 3 · CIUDAD NEON',tag:'NEON CITY',roadC:'#111120',lineC:'#00ffff',shL:'#1a1a3a',shR:'#1a1a3a',sky:['#050515','#0a0520'],bg:'buildings',tColors:['#ff00ff','#00ffff','#ff0080','#8000ff','#0080ff','#ff8000'],spdBase:5.5,spawnR:50,killsBoss:30,bossName:'CYBER TANK X-9',bgSpd:1.8,fuelCh:0.07}
];
const RX=60,RW=GW-120,LW=RW/3;

/* ===== POWER-UPS ===== */
const PU_TYPES=[
  {type:'shield',color:'#00aaff',label:'ESCUDO',dur:360},
  {type:'rapid',color:'#ff00ff',label:'RAPID FIRE',dur:280},
  {type:'double',color:'#ffaa00',label:'x2 PUNTOS',dur:400}
];

/* ===== UPGRADES ===== */
const UPG=[
  {id:'motor',name:'MOTOR',desc:'+15% velocidad base',max:5,cost:i=>1500+i*1200,apply:(g,i)=>{g.spdMult=1+i*0.15}},
  {id:'blindaje',name:'BLINDAJE',desc:'+1 vida extra',max:4,cost:i=>2500+i*2000,apply:(g,i)=>{g.extraLives=i}},
  {id:'canon',name:'CANON',desc:'-20% recarga',max:5,cost:i=>1000+i*800,apply:(g,i)=>{g.fireRate=Math.max(4,12-i*2)}},
  {id:'tanque',name:'TANQUE',desc:'+20% combustible',max:4,cost:i=>1200+i*1000,apply:(g,i)=>{g.maxFuel=100+i*20;g.fuel=Math.min(g.fuel,g.maxFuel)}}
];
function loadUp(){try{const d=JSON.parse(localStorage.getItem('ta_upg'));return d&&d.motor!==undefined?d:{motor:0,blindaje:0,canon:0,tanque:0}}catch(e){return{motor:0,blindaje:0,canon:0,tanque:0}}}
function saveUp(u){try{localStorage.setItem('ta_upg',JSON.stringify(u))}catch(e){}}
let upgrades=loadUp();

/* ===== INPUT ===== */
const K={};window.addEventListener('keydown',e=>{K[e.code]=true;['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].forEach(k=>{if(e.code===k)e.preventDefault()})});window.addEventListener('keyup',e=>{K[e.code]=false});

// Touch controls
let touchLeft=false, touchRight=false;
C.addEventListener('touchstart', e => {
  e.preventDefault();
  const touch = e.touches[0];
  const rect = C.getBoundingClientRect();
  const x = touch.clientX - rect.left;
  if (x < rect.width / 2) {
    touchLeft = true;
    K.ArrowLeft = true;
  } else {
    touchRight = true;
    K.ArrowRight = true;
  }
});
C.addEventListener('touchend', e => {
  e.preventDefault();
  if (touchLeft) {
    touchLeft = false;
    K.ArrowLeft = false;
  }
  if (touchRight) {
    touchRight = false;
    K.ArrowRight = false;
  }
});

// Button controls
document.getElementById('shootBtn').addEventListener('touchstart', e => { e.preventDefault(); K.Space = true; });
document.getElementById('shootBtn').addEventListener('touchend', e => { e.preventDefault(); K.Space = false; });
document.getElementById('turboBtn').addEventListener('touchstart', e => { e.preventDefault(); K.ArrowUp = true; });
document.getElementById('turboBtn').addEventListener('touchend', e => { e.preventDefault(); K.ArrowUp = false; });
document.getElementById('brakeBtn').addEventListener('touchstart', e => { e.preventDefault(); K.ArrowDown = true; });
document.getElementById('brakeBtn').addEventListener('touchend', e => { e.preventDefault(); K.ArrowDown = false; });

/* ===== HELPERS ===== */
let hiScore=parseInt(localStorage.getItem('ta_hi'))||0;
function saveHi(){try{localStorage.setItem('ta_hi',hiScore)}catch(e){}}
function dRR(x,y,w,h,r,fl,st){X.beginPath();X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.arcTo(x+w,y,x+w,y+r,r);X.lineTo(x+w,y+h-r);X.arcTo(x+w,y+h,x+w-r,y+h,r);X.lineTo(x+r,y+h);X.arcTo(x,y+h,x,y+h-r,r);X.lineTo(x,y+r);X.arcTo(x,y,x+r,y,r);X.closePath();if(fl){X.fillStyle=fl;X.fill()}if(st){X.strokeStyle=st;X.lineWidth=1;X.stroke()}}
function dk(hex,f){if(!hex||hex[0]!=='#')return hex||'#888';const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return'rgb('+Math.round(r*f)+','+Math.round(g*f)+','+Math.round(b*f)+')'}
function drawCar(cx,cy,w,h,body,roof,ws,lt,sh=true){
  if(sh){X.fillStyle='rgba(0,0,0,0.3)';X.beginPath();X.ellipse(cx,cy+h/2+2,w*0.4,4,0,0,Math.PI*2);X.fill()}
  dRR(cx-w/2,cy-h/2,w,h,3,body,null);
  dRR(cx-w*0.35,cy-h/2+h*0.15,w*0.7,h*0.42,3,roof,null);
  X.fillStyle=ws;X.beginPath();X.moveTo(cx-w*0.28,cy-h/2+h*0.16);X.lineTo(cx+w*0.28,cy-h/2+h*0.16);X.lineTo(cx+w*0.22,cy-h/2+h*0.36);X.lineTo(cx-w*0.22,cy-h/2+h*0.36);X.closePath();X.fill();
  X.fillStyle=lt;X.fillRect(cx-w/2+2,cy-h/2+2,6,4);X.fillRect(cx+w/2-8,cy-h/2+2,6,4);
  X.fillStyle='#111';[[cx-w/2+1,cy-h*0.3],[cx+w/2-5,cy-h*0.3],[cx-w/2+1,cy+h*0.25],[cx+w/2-5,cy+h*0.25]].forEach(([a,b])=>X.fillRect(a,b,4,8));
}
function drawPlayer(cx,cy,turbo,shield){
  const fl=turbo&&Math.random()>0.4;
  if(fl){X.fillStyle='rgba(255,140,0,0.7)';X.beginPath();X.ellipse(cx,cy+22,4,10+Math.random()*8,0,0,Math.PI*2);X.fill();X.fillStyle='rgba(255,220,0,0.5)';X.beginPath();X.ellipse(cx,cy+26,2,6+Math.random()*6,0,0,Math.PI*2);X.fill()}
  drawCar(cx,cy,30,52,'#e8e0d0','#d0c8b8','rgba(180,220,255,0.85)','#ffff88');
  X.fillStyle='rgba(200,50,50,0.7)';X.fillRect(cx-3,cy-24,6,48);
  X.fillStyle='rgba(255,255,180,0.6)';X.beginPath();X.ellipse(cx-9,cy-24,4,3,0,0,Math.PI*2);X.fill();X.beginPath();X.ellipse(cx+9,cy-24,4,3,0,0,Math.PI*2);X.fill();
  if(shield){X.strokeStyle='rgba(0,170,255,'+(0.4+0.3*Math.sin(game?game.frame*0.2:0))+')';X.lineWidth=2;X.beginPath();X.arc(cx,cy,28,0,Math.PI*2);X.stroke()}
}

/* ===== GAME ===== */
let game=null;
class Game{
  constructor(){
    this.si=0;this.score=0;this.lives=3;this.running=false;this.over=false;
    this.px=GW/2;this.py=GH-90;this.speed=0;this.fuel=100;this.maxFuel=100;
    this.invincible=0;this.turbo=false;this.roadOff=0;this.bgOff=0;this.frame=0;
    this.spawnT=0;this.traffic=[];this.bullets=[];this.particles=[];this.bgItems=[];
    this.fuelPicks=[];this.powerups=[];this.boss=null;this.bossActive=false;
    this.stageKills=0;this.combo=0;this.comboT=0;this.floats=[];this.fever=false;
    this.slowMo=0;this.timeScale=1;this.freezeF=0;this.newRec=false;
    this.stageDmg=0;this.activePU={shield:0,rapid:0,double:0};
    // Aplicar upgrades
    this.spdMult=1;this.extraLives=0;this.fireRate=12;
    upgrades=loadUp();
    UPG.forEach((u,i)=>{const lv=upgrades[u.id];u.apply(this,lv)});
    this.lives=3+this.extraLives;
    this.initBg();this.updateHUD();
    document.getElementById('stage-tag').textContent=STAGES[0].tag;
  }
  get st(){return STAGES[this.si]}
  getComboMult(){return this.combo>=15?10:this.combo>=10?8:this.combo>=7?5:this.combo>=5?3:this.combo>=3?2:1}
  initBg(){this.bgItems=[];for(let i=0;i<14;i++)this.bgItems.push({x:Math.random()<0.5?8+Math.random()*44:GW-52+Math.random()*44,y:Math.random()*GH,v:Math.floor(Math.random()*3)})}
  updateHUD(){
    document.getElementById('score').textContent=this.score.toString().padStart(6,'0');
    document.getElementById('hi-val').textContent=hiScore.toString().padStart(6,'0');
    const fp=Math.max(0,this.fuel/this.maxFuel*100);
    const ff=document.getElementById('fuel-fill');ff.style.width=fp+'%';
    ff.style.background=fp>30?'linear-gradient(90deg,#0f8,#0f4)':fp>15?'linear-gradient(90deg,#ff8,#fa0)':'linear-gradient(90deg,#f44,#f00)';
    document.getElementById('speed-val').textContent=Math.round(this.speed*3.6);
    const lr=document.getElementById('lives-row');lr.innerHTML='';
    for(let i=0;i<Math.max(0,this.lives);i++){const s=document.createElement('span');s.className='life-car';lr.appendChild(s)}

  /* --- UPDATE --- */
  update(){
    if(this.freezeF>0){this.freezeF--;return}
    this.frame++;
    const st=this.st;
    // Time scale
    this.timeScale=1;if(this.slowMo>0){this.timeScale=0.3;this.slowMo--}
    const ts=this.timeScale;

    // Velocidad
    this.turbo=(K['ArrowUp']||K['KeyW'])&&this.fuel>5;
    const braking=K['ArrowDown']||K['KeyS'];
    const tSpd=this.turbo?st.spdBase*60*1.8*this.spdMult:braking?st.spdBase*20*this.spdMult:st.spdBase*60*this.spdMult;
    this.speed+=(tSpd-this.speed)*0.04*ts;
    // Combustible
    if(this.turbo)this.fuel=Math.max(0,this.fuel-0.25*ts);else this.fuel=Math.min(this.maxFuel,this.fuel+0.04*ts);
    if(this.fuel<=0&&!this.turbo)this.speed=Math.max(10,this.speed*0.98);

    // Movimiento jugador
    const ls=(3.5+this.speed/200)*ts;
    if(K['ArrowLeft']||K['KeyA'])this.px=Math.max(RX+18,this.px-ls);
    if(K['ArrowRight']||K['KeyD'])this.px=Math.min(RX+RW-18,this.px+ls);

    // Disparo
    const rate=this.activePU.rapid>0?Math.max(3,this.fireRate/2):this.fireRate;
    if((K['Space']||K['KeyZ'])&&this.frame%Math.round(rate)===0){
      this.bullets.push({x:this.px-6,y:this.py-30,vy:-14*ts,w:4,h:10});
      this.bullets.push({x:this.px+6,y:this.py-30,vy:-14*ts,w:4,h:10});
      snd('shoot');
    }

    // Scroll
    const ss=this.speed/60*2*ts;
    this.roadOff=(this.roadOff+ss)%40;
    this.bgOff=(this.bgOff+ss*0.6)%GH;

    // Puntuacion
    let pts=Math.round(this.speed/200*ts*(this.activePU.double>0?2:1)*(this.fever?3:1)*this.getComboMult());
    this.score+=pts;
    if(this.frame%30===0)document.getElementById('score').textContent=this.score.toString().padStart(6,'0');
    if(this.score>hiScore&&!this.newRec){this.newRec=true;this.showFlash('NUEVO RECORD!','#0f8');snd('lvlup')}

    if(this.invincible>0)this.invincible-=ts;
    if(this.comboT>0){this.comboT-=ts;if(this.comboT<=0){this.combo=0;this.fever=false}}

    // Power-up timers
    for(let k in this.activePU)if(this.activePU[k]>0)this.activePU[k]-=ts;

    // Fever check
    if(this.combo>=10&&!this.fever){this.fever=true;snd('fever');shake(5);this.addFloat(GW/2,GH*0.3,'FEVER!','#ff0044',22)}

    // BG items
    this.bgItems.forEach(b=>{b.y+=ss*0.8;if(b.y>GH+60){b.y=-60;b.x=Math.random()<0.5?8+Math.random()*44:GW-52+Math.random()*44;b.v=Math.floor(Math.random()*3)}});

    // Fuel pickups
    this.fuelPicks=this.fuelPicks.filter(f=>{f.y+=ss*0.5;f.pulse=(f.pulse||0)+0.1*ts;if(Math.abs(f.x-this.px)<20&&Math.abs(f.y-this.py)<20){this.fuel=Math.min(this.maxFuel,this.fuel+25);this.addParts(f.x,f.y,'#00ff88',8,3);this.addFloat(f.x,f.y-15,'+FUEL','#00ff88',10);snd('pickup');return false}return f.y<GH+40});

    // Power-ups en carretera
    this.powerups=this.powerups.filter(p=>{p.y+=ss*0.5;p.pulse=(p.pulse||0)+0.12*ts;
      // Iman: atraer al jugador
      if(this.activePU.shield>0||Math.abs(p.x-this.px)<22&&Math.abs(p.y-this.py)<22){
        this.activePU[p.type]=p.dur;this.addParts(p.x,p.y,p.color,15,3);
        this.addFloat(p.x,p.y-15,p.label,p.color,12);snd('pwrup');shake(4);return false}
      // Atraccion visual (brillo sigue al jugador)
      return p.y<GH+40});

    // Particulas
    this.particles=this.particles.filter(p=>{p.x+=p.vx*ts;p.y+=p.vy*ts;p.life-=ts;if(p.smoke){p.vx*=0.95;p.vy-=0.05*ts;p.sz+=0.1*ts}else p.vy+=0.15*ts;return p.life>0});

    // Balas
    this.bullets=this.bullets.filter(b=>{b.y+=b.vy;let hit=false;
      if(this.boss&&this.bossActive){const bo=this.boss;if(b.x>bo.x-bo.w/2&&b.x<bo.x+bo.w/2&&b.y>bo.y-bo.h/2&&b.y<bo.y+bo.h/2){bo.hp--;bo.flash=5;this.addParts(b.x,b.y,this.si===2?'#00ffff':'#ffaa00',4,2);document.getElementById('boss-fill').style.width=(bo.hp/bo.maxHp*100)+'%';if(bo.hp<=0)this.defeatBoss();return false}}
      this.traffic=this.traffic.filter(t=>{
        if(!hit&&b.x>t.x-t.w/2&&b.x<t.x+t.w/2&&b.y>t.y-t.h/2&&b.y<t.y+t.h/2){
          t.hp--;t.flash=6;this.addParts(b.x,b.y,'#ffaa00',3,2);
          if(t.hp<=0){
            const mult=this.getComboMult()*(this.activePU.double>0?2:1)*(this.fever?3:1);
            const pts2=(t.isTruck?150:50)*mult;
            this.score+=pts2;this.addFloat(t.x,t.y,'+'+pts2,t.isTruck?'#ff8':'#fa0',t.isTruck?14:11);
            this.addParts(t.x,t.y,t.color,t.isTruck?20:12,3);snd('explode',{freq:400+Math.random()*400,vol:0.1});
            if(t.hasFuel)this.fuelPicks.push({x:t.x,y:t.y,pulse:0});
            // Power-up drop chance
            if(Math.random()<0.06){const pu=PU_TYPES[Math.floor(Math.random()*PU_TYPES.length)];this.powerups.push({...pu,x:t.x,y:t.y,pulse:0})}
            this.stageKills++;this.combo++;this.comboT=120;this.bestCombo=Math.max(this.bestCombo||0,this.combo);
            if(this.combo>=3){snd('combo',{n:this.combo});this.slowMo=Math.max(this.slowMo,Math.min(8,this.combo>=10?6:3))}
            shake(t.isTruck?6:3);hit=true;return false}
          hit=true}return true});
      return!hit&&b.y>-10});

    // Spawn trafico
    if(!this.bossActive){this.spawnT-=ts;if(this.spawnT<=0){this.spawnT=Math.max(25,st.spawnR-(this.score/600));this.spawnTraffic()}}

    // Mover trafico
    this.traffic=this.traffic.filter(t=>{
      t.y+=ss+(t.speed*0.6)*ts;if(t.flash>0)t.flash--;
      if(!t.isBullet&&t.hp<t.maxHp)this.addSmoke(t.x,t.y-t.h/2);
      // Near-miss
      if(!t.isBullet&&!t.nearMissed&&this.invincible<=0){
        const dx=Math.abs(t.x-this.px),dy=Math.abs(t.y-this.py);
        const hw=(t.w+24)/2-4,hh=(t.h+44)/2-6;
        if(dy<hh+12&&dy>hh-4&&dx<hw+18){
          t.nearMissed=true;
          const nm=(25+this.combo*5)*this.getComboMult()*(this.activePU.double>0?2:1)*(this.fever?3:1);
          this.score+=nm;this.addFloat(this.px,this.px<t.x?this.px+20:this.px-20,'CERCA! +'+nm,'#00ffff',10);
          this.addParts(this.px,this.py,'#00ffff',6,2);snd('nearmiss');shake(3);this.slowMo=Math.max(this.slowMo,4);
          this.combo++;this.comboT=120;this.bestCombo=Math.max(this.bestCombo||0,this.combo);
        }
      }
      // Colision
      if(this.invincible<=0&&!t.isBullet){
        if(Math.abs(t.x-this.px)<(t.w+24)/2-4&&Math.abs(t.y-this.py)<(t.h+44)/2-6){this.addParts(this.px,this.py,'#ff2200',16,4);this.takeHit()}
      }
      return t.y<GH+80});

    // Boss
    if(this.boss&&this.bossActive){
      const bo=this.boss;bo.frame++;
      if(bo.y<GH*0.2)bo.y+=1.8*ts;
      bo.x+=bo.vx*ts;if(bo.x>GW-50||bo.x<50)bo.vx*=-1;
      if(bo.flash>0)bo.flash--;
      const phase=bo.hp<bo.maxHp*0.33?3:bo.hp<bo.maxHp*0.66?2:1;
      bo.shootT+=ts;
      const si=Math.max(15,35-this.si*5-phase*5);
      if(bo.shootT>si){bo.shootT=0;
        for(let i=0;i<phase+1;i++){const a=Math.PI/2+(i-phase/2)*0.35;
          this.traffic.push({x:bo.x+Math.cos(a)*25,y:bo.y+bo.h/2,w:12,h:20,color:'#ff2200',speed:-2,hp:1,maxHp:1,isBullet:true,flash:0,hasFuel:false,nearMissed:true})}
      }
      if(this.invincible<=0&&Math.abs(bo.x-this.px)<(bo.w+24)/2-6&&Math.abs(bo.y-this.py)<(bo.h+44)/2-6)this.takeHit();
    }
    if(!this.bossActive&&!this.boss&&this.stageKills>=st.killsBoss){this.traffic=[];this.spawnBoss()}
    // Floats
    this.floats=this.floats.filter(f=>{f.y+=f.vy*ts;f.vy*=0.97;f.life-=ts;return f.life>0});
    this.updateHUD();
  }
  /* --- DRAW --- */
  drawBg(){
    const st=this.st,sg=X.createLinearGradient(0,0,0,GH);
    st.sky.forEach((c,i)=>sg.addColorStop(i/(st.sky.length-1),c));X.fillStyle=sg;X.fillRect(0,0,GW,GH);

      else if(st.bg==='cactus'){X.fillStyle='#4a7a2a';X.fillRect(-3,-20,6,24);X.fillRect(-12,-12,9,5);X.fillRect(3,-10,9,5);X.fillRect(-12,-16,5,8);X.fillRect(7,-14,5,8)}
      else{const bh=30+it.v*20;X.fillStyle=['#0a0a1a','#050510','#10102a'][it.v];X.fillRect(-12,-bh,24,bh);const nc=['#ff00ff','#00ffff','#ff8800'][it.v];X.strokeStyle=nc;X.lineWidth=0.5;X.strokeRect(-12,-bh,24,bh);for(let r=0;r<4;r++)for(let c=0;c<3;c++){if(Math.random()>0.4){X.fillStyle=nc;X.globalAlpha=0.3+Math.random()*0.4;X.fillRect(-10+c*7,-bh+4+r*7,5,4)}}X.globalAlpha=1}
      X.restore()})

  drawRoad(){
    const st=this.st;

    X.fillStyle=st.roadC;X.fillRect(RX,0,RW,GH);
    const rg=X.createLinearGradient(0,0,0,GH);rg.addColorStop(0,'rgba(0,0,0,0.4)');rg.addColorStop(0.4,'rgba(0,0,0,0)');X.fillStyle=rg;X.fillRect(RX,0,RW,GH);

        if(t.hp<t.maxHp){X.fillStyle='#333';X.fillRect(t.x-t.w/2,t.y+t.h/2+2,t.w,3);X.fillStyle='#0f8';X.fillRect(t.x-t.w/2,t.y+t.h/2+2,t.w*(t.hp/t.maxHp),3)}
      }else{drawCar(t.x,t.y,t.w,t.h,bc,fl?'#eee':dk(t.color,0.75),'rgba(180,220,255,0.8)','#ff6666')}
    })
  }
  drawBoss(){
    const bo=this.boss;if(!bo)return;const f=bo.flash>0,ac=bo.accent;
    X.save();X.translate(bo.x,bo.y);
    if(this.si===0){
      X.fillStyle=f?'#fff':'#1a1a1a';dRR(-bo.w/2,-bo.h/2,bo.w,bo.h*0.3,3,X.fillStyle,null);
      X.fillStyle=f?'#fff':'rgba(160,200,255,0.8)';dRR(-bo.w/2+3,-bo.h/2+4,bo.w-6,bo.h*0.12,2,X.fillStyle,null);
      dRR(-bo.w/2,-bo.h/2+bo.h*0.32,bo.w,bo.h*0.68,3,f?'#eee':'#444',null);
      X.fillStyle=ac;X.font='bold 28px serif';X.textAlign='center';X.textBaseline='middle';X.fillText('\u2620',0,8);
      for(let i=0;i<3;i++){X.fillStyle='rgba(255,'+(100+i*50)+',0,'+(0.5+Math.sin(bo.frame*0.3+i)*0.3)+')';X.beginPath();X.ellipse(-20+i*20,bo.h/2+8+Math.random()*6,4,8+Math.random()*5,0,0,Math.PI*2);X.fill()}
    }else if(this.si===1){
      X.fillStyle=f?'#fff':'#3a2010';dRR(-bo.w/2,-bo.h/2,bo.w,bo.h,4,X.fillStyle,null);
      X.fillStyle=f?'#eee':'#2a1008';dRR(-bo.w/2+4,-bo.h/2+4,bo.w-8,bo.h*0.4,3,X.fillStyle,null);
      X.fillStyle=ac;X.beginPath();X.arc(0,-bo.h/2+bo.h*0.65,16,0,Math.PI*2);X.fill();
      for(let i=0;i<4;i++){const wx=-bo.w/2+8+i*20;X.fillStyle='#222';X.beginPath();X.arc(wx,bo.h/2-4,8,0,Math.PI*2);X.fill();X.strokeStyle=ac;X.lineWidth=2;X.beginPath();X.arc(wx,bo.h/2-4,8,0,Math.PI*2);X.stroke()}
    }else{
      X.fillStyle=f?'#fff':'#0a0a1a';dRR(-bo.w/2,-bo.h/2,bo.w,bo.h,6,X.fillStyle,null);
      X.strokeStyle=ac;X.lineWidth=1.5;dRR(-bo.w/2+2,-bo.h/2+2,bo.w-4,bo.h-4,5,null,ac);
      X.globalAlpha=0.3;for(let i=0;i<5;i++){X.strokeStyle=ac;X.lineWidth=0.5;X.beginPath();X.moveTo(-bo.w/2,(-bo.h/2)+i*(bo.h/4));X.lineTo(bo.w/2,(-bo.h/2)+i*(bo.h/4));X.stroke()}X.globalAlpha=1;
      X.fillStyle=ac;X.beginPath();X.ellipse(0,0,18,10,0,0,Math.PI*2);X.fill();
      X.fillStyle=f?'#000':'#ff0000';X.beginPath();X.arc(0,0,7,0,Math.PI*2);X.fill();
      X.fillStyle='#fff';X.beginPath();X.arc(3,-2,3,0,Math.PI*2);X.fill();
      const sy=-bo.h/2+((bo.frame*2)%bo.h);X.fillStyle='rgba(0,255,255,0.15)';X.fillRect(-bo.w/2,sy,bo.w,4);
    }
    const r=bo.hp/bo.maxHp;X.fillStyle='rgba(0,0,0,0.5)';X.fillRect(-bo.w/2,-bo.h/2-14,bo.w,8);
    X.fillStyle=r>0.5?'#0f8':r>0.25?'#fa0':'#f33';X.fillRect(-bo.w/2,-bo.h/2-14,bo.w*r,8);
    X.strokeStyle='#fff';X.lineWidth=0.5;X.strokeRect(-bo.w/2,-bo.h/2-14,bo.w,8);
    X.restore();
  }
  drawBullets(){
    const gc=[['#00ffff','rgba(0,255,255,0.3)'],['#ffaa00','rgba(255,170,0,0.3)'],['#ff00ff','rgba(255,0,255,0.3)']][this.si];
    this.bullets.forEach(b=>{X.fillStyle=gc[1];X.beginPath();X.ellipse(b.x,b.y,b.w*2,b.h*0.8,0,0,Math.PI*2);X.fill();X.fillStyle=gc[0];X.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h);X.fillStyle='#fff';X.fillRect(b.x-1,b.y-b.h/2,2,b.h*0.4)})
  }
  drawParticles(){
    this.particles.forEach(p=>{const a=Math.max(0,p.life/45);X.globalAlpha=p.smoke?a*0.4:a;X.fillStyle=p.col;X.beginPath();X.arc(p.x,p.y,Math.max(0.5,p.sz),0,Math.PI*2);X.fill()});X.globalAlpha=1
  }
  drawFloats(){
    this.floats.forEach(f=>{const a=Math.min(1,f.life/15);X.globalAlpha=a;X.font='bold '+f.sz+'px Orbitron,monospace';X.textAlign='center';X.textBaseline='middle';X.shadowColor=f.col;X.shadowBlur=8;X.fillStyle=f.col;X.fillText(f.txt,f.x,f.y);X.shadowBlur=0});X.globalAlpha=1
  }
  drawCombo(){
    if(this.combo<2)return;
    const mult=this.getComboMult(),sz=Math.min(38,14+this.combo*1.8),a=Math.min(1,this.comboT/30);
    const gc=this.combo>=10?'#ff0044':this.combo>=7?'#ff4400':this.combo>=5?'#ff8800':'#f0c020';
    X.save();X.globalAlpha=a;X.font='900 '+sz+'px Orbitron,monospace';X.textAlign='center';X.textBaseline='middle';
    X.shadowColor=gc;X.shadowBlur=20;X.fillStyle=gc;X.fillText('x'+mult,GW/2,GH*0.22);
    if(this.combo>=3){X.font='700 '+Math.max(8,sz*0.35)+'px Orbitron,monospace';X.fillText('COMBO',GW/2,GH*0.22-sz*0.6)}
    X.restore();
  }
  drawPUIndicators(){
    let y=70;
    for(let k in this.activePU){
      if(this.activePU[k]<=0)continue;
      const pu=PU_TYPES.find(p=>p.type===k);if(!pu)continue;
      const pct=this.activePU[k]/PU_TYPES.find(p=>p.type===k).dur;
      X.fillStyle='rgba(0,0,0,0.5)';X.fillRect(8,y,55,10);
      X.fillStyle=pu.color;X.fillRect(8,y,55*pct,10);
      X.font='6px Orbitron,monospace';X.fillStyle='#fff';X.textAlign='left';X.textBaseline='middle';X.fillText(pu.label,10,y+5);
      y+=14;
    }
  }
  drawMinimap(){
    const mx=GW-50,my=GH-110,mw=40,mh=90;
    X.fillStyle='rgba(0,0,0,0.6)';dRR(mx-2,my-2,mw+4,mh+4,3,'rgba(0,0,0,0.6)',null);
    X.strokeStyle='#444';X.lineWidth=0.5;X.strokeRect(mx,my,mw,mh);
    X.fillStyle='#333';X.fillRect(mx+mw*0.25,my,mw*0.5,mh);
    const pmx=mx+(this.px-RX)/RW*mw*0.5+mw*0.25;
    X.fillStyle='#0ff';X.beginPath();X.arc(pmx,my+mh-10,3,0,Math.PI*2);X.fill();
    this.traffic.forEach(t=>{if(t.isBullet)return;const tmx=mx+(t.x-RX)/RW*mw*0.5+mw*0.25,tmy=my+(t.y/GH)*mh;if(tmy>my&&tmy<my+mh){X.fillStyle='#f80';X.beginPath();X.arc(tmx,tmy,1.5,0,Math.PI*2);X.fill()}});
    if(this.boss){X.fillStyle='#f33';X.beginPath();X.arc(mx+mw/2,my+(this.boss.y/GH)*mh,4,0,Math.PI*2);X.fill()}
  }
  drawProgress(){
    if(this.bossActive)return;
    const p=Math.min(1,this.stageKills/this.st.killsBoss);
    X.fillStyle='rgba(0,0,0,0.5)';dRR(RX,GH-12,RW,8,2,'rgba(0,0,0,0.5)',null);
    X.fillStyle=this.si===2?'#ff00ff':this.si===1?'#ff8800':'#00cc88';X.fillRect(RX,GH-12,RW*p,8);
    X.font='7px Orbitron,monospace';X.fillStyle='#fff';X.textAlign='center';X.textBaseline='middle';X.fillText('JEFE: '+this.stageKills+'/'+this.st.killsBoss,GW/2,GH-8);
  }
  draw(){
    X.clearRect(0,0,GW,GH);X.save();X.translate(skX,skY);
    this.drawBg();this.drawBgItems();this.drawRoad();this.drawSpeedLines();this.drawVignette();
    this.drawFuelPicks();this.drawPowerups();this.drawParticles();this.drawTraffic();
    this.drawBoss();this.drawBullets();
    if(!(this.invincible>0&&this.frame%6<3))drawPlayer(this.px,this.py,this.turbo,this.activePU.shield>0);
    this.drawMinimap();this.drawFloats();this.drawCombo();this.drawFever();this.drawPUIndicators();this.drawProgress();
    X.restore();
  }
  loop(){if(!this.running)return;updShake();this.update();this.draw();requestAnimationFrame(()=>this.loop())}
  start(){this.running=true;document.getElementById('overlay').style.display='none';this.loop()}
}

/* ===== INIT ===== */
document.getElementById('startBtn').addEventListener('click',()=>{initAudio();game=new Game();game.start()});
document.getElementById('shopContinue').addEventListener('click',()=>{
  document.getElementById('shop').style.display='none';
  document.getElementById('overlay').style.display='none';
  if(game&&!game.over){game.running=true;game.loop()}
});
// Fondo inicial
X.fillStyle='#1a3a5a';X.fillRect(0,0,GW,GH);X.fillStyle='#2a2a2a';X.fillRect(RX,0,RW,GH);
document.getElementById('hi-val').textContent=hiScore.toString().padStart(6,'0');
</script>
